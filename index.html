<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nouvelle demande – Delpharm Boucherville</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 2rem 1rem; color: #222; }
    .container { max-width: 540px; margin: 0 auto; background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 4px; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; }
    label { font-size: 13px; color: #555; display: block; margin-bottom: 5px; }
    input, select, textarea { width: 100%; padding: 9px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #222; margin-bottom: 16px; font-family: sans-serif; }
    textarea { resize: vertical; }
    .custom-box { background: #f9f9f9; border-radius: 10px; padding: 1rem; margin-bottom: 16px; }
    .custom-box p { font-size: 13px; font-weight: 500; margin-bottom: 12px; }
    .prio-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .prio-btn { font-size: 13px; padding: 5px 14px; border-radius: 8px; border: 1px solid #ddd; background: white; color: #555; cursor: pointer; }
    .prio-btn.active { background: #e8f0fe; color: #1a56db; border-color: #1a56db; }
    button[type=submit] { width: 100%; padding: 12px; font-size: 15px; font-weight: 500; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer; }
    button[type=submit]:hover { background: #f0f0f0; }
    #status { display: none; font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }
    #success-view { display: none; text-align: center; padding: 2rem 0; }
    #success-view .check { width: 56px; height: 56px; border-radius: 50%; background: #d1fae5; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 26px; }
  </style>
</head>
<body>
  <div class="container">
    <p class="subtitle">Delpharm Boucherville</p>
    <h1>Nouvelle demande</h1>

    <div id="form-view">
      <label>Titre de la demande *</label>
      <input id="f-title" type="text" placeholder="ex. Remplacement éclairage zone B" />

      <label>Description *</label>
      <textarea id="f-desc" rows="4" placeholder="Décrivez la demande en détail..."></textarea>

      <label>Localisation / zone *</label>
      <select id="f-location">
        <option value="">Sélectionner une zone...</option>
        <option value="Li01">Ligne Li01</option>
        <option value="Li02">Ligne Li02</option>
        <option value="Li05">Ligne Li05</option>
        <option value="CA01">Zone CA01</option>
        <option value="CA03">Zone CA03</option>
        <option value="CA04">Zone CA04</option>
        <option value="CA07">Zone CA07</option>
        <option value="Batiment">Bâtiment général</option>
      </select>

      <div class="custom-box">
        <p>Champs supplémentaires</p>
        <label>Priorité</label>
        <div class="prio-group">
          <button class="prio-btn" onclick="selectPrio(this,'Faible')">Faible</button>
          <button class="prio-btn" onclick="selectPrio(this,'Moyen')">Moyen</button>
          <button class="prio-btn" onclick="selectPrio(this,'Élevé')">Élevé</button>
          <button class="prio-btn" onclick="selectPrio(this,'Urgent')">Urgent</button>
        </div>
        <label>Type de demande</label>
        <select id="f-type">
          <option value="">Sélectionner...</option>
          <option>Maintenance bâtiment</option>
          <option>Sécurité / HSE</option>
          <option>Équipement / machine</option>
          <option>IT / informatique</option>
          <option>Autre</option>
        </select>
        <label>Nom du demandeur (optionnel)</label>
        <input id="f-name" type="text" placeholder="ex. Jean Tremblay" />
      </div>

      <div id="status"></div>

      <button type="submit" onclick="submitForm()">Soumettre la demande</button>
    </div>

    <div id="success-view">
      <div class="check">✓</div>
      <h2 style="font-size:18px; font-weight:500; margin-bottom:8px;">Demande envoyée</h2>
      <p style="font-size:14px; color:#666; margin-bottom:1.5rem;">Votre demande a été transmise avec succès.</p>
      <button type="submit" onclick="resetForm()">Nouvelle demande</button>
    </div>
  </div>

  <script>
    const WEBHOOK_URL = 'https://hook.us2.make.com/qb4v81qbkowgq4yf0j6wyinyuz67dde7';
    let selectedPrio = '';

    function selectPrio(btn, val) {
      selectedPrio = val;
      document.querySelectorAll('.prio-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.style.display = 'block';
      el.textContent = msg;
      el.style.background = type === 'error' ? '#fee2e2' : '#fef9c3';
      el.style.color = type === 'error' ? '#991b1b' : '#713f12';
    }

    async function submitForm() {
      const title = document.getElementById('f-title').value.trim();
      const desc = document.getElementById('f-desc').value.trim();
      const location = document.getElementById('f-location').value;
      const type = document.getElementById('f-type').value;
      const name = document.getElementById('f-name').value.trim();

      if (!title) { showStatus('Le titre est requis.', 'error'); return; }
      if (!desc) { showStatus('La description est requise.', 'error'); return; }
      if (!location) { showStatus('Veuillez sélectionner une zone.', 'error'); return; }

      const btn = document.querySelector('button[type=submit]');
      btn.disabled = true;
      btn.textContent = 'Envoi en cours...';

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title, description: desc, location,
            priority: selectedPrio || 'Non définie',
            type: type || 'Non défini',
            requester: name || 'Anonyme'
          })
        });

        if (response.ok) {
          document.getElementById('form-view').style.display = 'none';
          document.getElementById('success-view').style.display = 'block';
        } else {
          showStatus('Erreur lors de l\'envoi. Réessayez.', 'error');
          btn.disabled = false;
          btn.textContent = 'Soumettre la demande';
        }
      } catch(e) {
        showStatus('Connexion échouée. Vérifiez votre réseau.', 'error');
        btn.disabled = false;
        btn.textContent = 'Soumettre la demande';
      }
    }

    function resetForm() {
      document.getElementById('f-title').value = '';
      document.getElementById('f-desc').value = '';
      document.getElementById('f-location').value = '';
      document.getElementById('f-type').value = '';
      document.getElementById('f-name').value = '';
      selectedPrio = '';
      document.querySelectorAll('.prio-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('status').style.display = 'none';
      document.querySelector('button[type=submit]').disabled = false;
      document.querySelector('button[type=submit]').textContent = 'Soumettre la demande';
      document.getElementById('form-view').style.display = 'block';
      document.getElementById('success-view').style.display = 'none';
    }
  </script>
</body>
</html>
